<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ArkShare</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#121212;color:#fff;margin:0;padding:20px}
.card{max-width:700px;margin:auto;background:#1e1e1e;padding:20px;border-radius:12px}
button,input{padding:10px;margin:5px;width:100%;box-sizing:border-box}
#chat{height:220px;overflow:auto;border:1px solid #444;padding:10px}
.msg{margin:4px 0;padding:6px;border-radius:6px;background:#333}
.hidden{display:none}
</style>
</head>
<body>
<div class="card">
<h1>ArkShare</h1>

<div id="home">
<button onclick="startTV()">Modo TV</button>
<button onclick="startMobile()">Modo Celular</button>
</div>

<div id="tv" class="hidden">
<h2>TV</h2>
<p>Código:</p>
<h3 id="tvCode">...</h3>
<div id="tvStatus">Inicializando...</div>
<div id="chat"></div>
</div>

<div id="mobile" class="hidden">
<h2>Celular</h2>
<input id="target" placeholder="Código da TV">
<button onclick="connectTV()">Conectar</button>
<div id="mobileArea" class="hidden">
<input id="msg" placeholder="Mensagem">
<button onclick="sendMsg()">Enviar Mensagem</button>
<input type="file" id="file">
<button onclick="sendFile()">Enviar Arquivo</button>
</div>
</div>
</div>

<script>
let peer=null,conn=null;

function addChat(txt){
 let d=document.createElement("div");
 d.className="msg";
 d.textContent=txt;
 document.getElementById("chat").appendChild(d);
}

function startTV(){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("tv").classList.remove("hidden");

 const code="ARK"+Math.floor(Math.random()*90000+10000);
 document.getElementById("tvCode").innerText=code;

 peer=new Peer("tv-"+code);

 peer.on("open",()=>{
   document.getElementById("tvStatus").innerText="Aguardando conexão";
 });

 peer.on("connection",c=>{
   conn=c;
   document.getElementById("tvStatus").innerText="Conectado";

   conn.on("data",data=>{
      if(data.type==="text"){
        addChat("Celular: "+data.content);
      }
      if(data.type==="file"){
        const a=document.createElement("a");
        a.href=data.data;
        a.download=data.name;
        a.textContent="Baixar "+data.name;
        document.getElementById("chat").appendChild(a);
        document.getElementById("chat").appendChild(document.createElement("br"));
      }
   });
 });

 peer.on("error",e=>alert("Erro: "+e.type));
}

function startMobile(){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("mobile").classList.remove("hidden");
 peer=new Peer();
}

function connectTV(){
 const code=document.getElementById("target").value.trim().toUpperCase();
 conn=peer.connect("tv-"+code);

 conn.on("open",()=>{
   document.getElementById("mobileArea").classList.remove("hidden");
   alert("Conectado");
 });

 conn.on("error",()=>alert("Falha na conexão"));
}

function sendMsg(){
 if(!conn||!conn.open)return;
 const t=document.getElementById("msg").value;
 conn.send({type:"text",content:t});
 document.getElementById("msg").value="";
}

function sendFile(){
 if(!conn||!conn.open)return;

 const f=document.getElementById("file").files[0];
 if(!f)return;

 const r=new FileReader();
 r.onload=e=>{
   conn.send({
      type:"file",
      name:f.name,
      data:e.target.result
   });
 };
 r.readAsDataURL(f);
}
</script>
</body>
</html>
